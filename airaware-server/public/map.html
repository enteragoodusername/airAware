<!DOCTYPE html>
<html>
<head>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8">
         <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
          <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

</head>
<body>

    <a id="device_link" href="/index.html"><img src="weather-icon.svg"></a>
     <div id="map"></div>
     <div id="no-data" hidden>
         <h1>No data in the section</h2>
     </div>
     <div id="summary">
         <h1>Averages</h1>
                 <div class="stats_grid">
            <div class="stat_card">
                <div class="stat_label">Temperature</div>
                <div class="stat_value"><span id="temp_value">...</span><span class="stat_unit">°C</span></div>
            </div>

            <div class="stat_card">
                <div class="stat_label">PPM</div>
                <div class="stat_value"><span id="ppm_value">...</span><span class="stat_unit">ppm</span></div>
            </div>

            <div class="stat_card">
                <div class="stat_label">Humidity</div>
                <div class="stat_value"><span id="humidity_value">...</span><span class="stat_unit">%</span></div>
            </div>
    </div>

     </div>
     <script src="map.js"></script>

</body>
</html>
